name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build
        run: make build

      - name: Run unit tests
        run: go test -v -count=1 ./x/agent/...

      - name: Run tests with coverage
        run: |
          go test -coverprofile=coverage.out -covermode=atomic ./x/agent/keeper/
          go tool cover -func=coverage.out | tail -1

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Check formatting
        run: |
          gofmt -l ./x/agent/ ./app/ ./precompiles/
          test -z "$(gofmt -l ./x/agent/ ./app/ ./precompiles/)"

      - name: Vet
        run: go vet ./...
