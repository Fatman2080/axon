global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "axon-validators"
    static_configs:
      - targets:
          - "axon-node-0:26660"
          - "axon-node-1:26660"
          - "axon-node-2:26660"
          - "axon-node-3:26660"
        labels:
          chain: "axon-testnet"

  - job_name: "axon-faucet"
    metrics_path: "/health"
    static_configs:
      - targets:
          - "faucet:8080"
