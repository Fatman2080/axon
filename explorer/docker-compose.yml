# Blockscout Block Explorer for Axon Chain
# Usage: cd explorer && docker compose up -d
# Access: http://localhost:4000

services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_PASSWORD: blockscout
      POSTGRES_USER: blockscout
      POSTGRES_DB: blockscout
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockscout"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  blockscout-init:
    image: blockscout/blockscout:latest
    depends_on:
      db:
        condition: service_healthy
    command: /bin/sh -c '/app/bin/blockscout eval "Elixir.Explorer.ReleaseTasks.create_and_migrate()"'
    environment:
      DATABASE_URL: postgresql://blockscout:blockscout@db:5432/blockscout
      ETHEREUM_JSONRPC_VARIANT: geth
      ETHEREUM_JSONRPC_HTTP_URL: http://host.docker.internal:8545
      COIN: AXON
      MIX_ENV: prod
      ECTO_USE_SSL: "false"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  blockscout:
    image: blockscout/blockscout:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      blockscout-init:
        condition: service_completed_successfully
    command: /app/bin/blockscout start
    environment:
      DATABASE_URL: postgresql://blockscout:blockscout@db:5432/blockscout

      ETHEREUM_JSONRPC_VARIANT: geth
      ETHEREUM_JSONRPC_HTTP_URL: http://host.docker.internal:8545
      ETHEREUM_JSONRPC_WS_URL: ws://host.docker.internal:8546
      ETHEREUM_JSONRPC_TRACE_URL: http://host.docker.internal:8545

      CHAIN_ID: "9001"
      COIN: AXON
      COIN_NAME: Axon
      NETWORK: Axon Testnet
      SUBNETWORK: Axon Local

      LOGO: /images/blockscout_logo.svg
      BLOCKSCOUT_HOST: localhost
      BLOCKSCOUT_PROTOCOL: http
      PORT: "4000"

      INDEXER_DISABLE_INTERNAL_TRANSACTIONS_FETCHER: "true"
      INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER: "true"
      FETCH_REWARDS_WAY: manual

      POOL_SIZE: "50"
      POOL_SIZE_API: "10"
      ECTO_USE_SSL: "false"

      ACCOUNT_REDIS_URL: redis://redis:6379

      SECRET_KEY_BASE: "axon_blockscout_secret_key_base_for_local_testing_only_change_in_production_1234567890abcdef"

      MIX_ENV: prod

    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    image: ghcr.io/blockscout/frontend:latest
    container_name: axon-explorer-frontend
    restart: always
    depends_on:
      - blockscout
    environment:
      NEXT_PUBLIC_API_HOST: localhost
      NEXT_PUBLIC_API_PORT: "4000"
      NEXT_PUBLIC_API_PROTOCOL: http
      NEXT_PUBLIC_NETWORK_NAME: "Axon Testnet"
      NEXT_PUBLIC_NETWORK_SHORT_NAME: "Axon"
      NEXT_PUBLIC_NETWORK_ID: "9001"
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: "AXON"
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: "AXON"
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: "18"
      NEXT_PUBLIC_API_BASE_PATH: /
      NEXT_PUBLIC_HOMEPAGE_CHARTS: "['daily_txs']"
      NEXT_PUBLIC_IS_TESTNET: "true"
      NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: ws
      NEXT_PUBLIC_APP_HOST: localhost
      NEXT_PUBLIC_APP_PORT: "3001"
      NEXT_PUBLIC_APP_PROTOCOL: http
    ports:
      - "3001:3000"

  smart-contract-verifier:
    image: ghcr.io/blockscout/smart-contract-verifier:latest
    restart: always
    environment:
      SMART_CONTRACT_VERIFIER__SERVER__HTTP__ADDR: 0.0.0.0:8043
    ports:
      - "8043:8043"

volumes:
  postgres-data:
